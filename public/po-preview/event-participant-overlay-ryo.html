<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ryo event participant overlay preview</title>
    <style>
      :root {
        color: #1f2933;
        font-family:
          "Yu Gothic", "Hiragino Sans", "Meiryo", system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: #f4efe8;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }

      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
      }

      .card {
        border: 1px solid rgba(31, 41, 51, 0.14);
        border-radius: 18px;
        overflow: hidden;
        background: #fff;
        box-shadow: 0 14px 36px rgba(31, 41, 51, 0.12);
      }

      .stage {
        min-height: 420px;
        display: grid;
        place-items: end center;
        padding: 24px 12px;
      }

      .stage img {
        max-height: 390px;
        max-width: 92%;
        object-fit: contain;
      }

      .white {
        background: #fff;
      }

      .dark {
        background:
          radial-gradient(circle at 50% 20%, rgba(118, 141, 164, 0.35), transparent 45%),
          #172131;
      }

      .event {
        background:
          linear-gradient(rgba(255, 244, 224, 0.38), rgba(255, 244, 224, 0.24)),
          radial-gradient(circle at 52% 74%, rgba(86, 130, 156, 0.48), transparent 28%),
          linear-gradient(135deg, #c8a26f, #7b8d72 58%, #55778a);
      }

      .caption {
        padding: 12px 14px 14px;
        font-size: 0.95rem;
      }

      code {
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ryo event participant overlay preview</h1>
      <p>
        Path:
        <code>/art/characters/defaults/ryo/overlays/event-participant/neutral-body.png</code>
      </p>
      <div class="preview-grid">
        <section class="card">
          <div class="stage white">
            <img
              src="../art/characters/defaults/ryo/overlays/event-participant/neutral-body.png"
              alt="Ryo neutral participant overlay on white background"
            />
          </div>
          <div class="caption">White background</div>
        </section>
        <section class="card">
          <div class="stage dark">
            <img
              src="../art/characters/defaults/ryo/overlays/event-participant/neutral-body.png"
              alt="Ryo neutral participant overlay on dark background"
            />
          </div>
          <div class="caption">Dark background</div>
        </section>
        <section class="card">
          <div class="stage event">
            <img
              src="../art/characters/defaults/ryo/overlays/event-participant/neutral-body.png"
              alt="Ryo neutral participant overlay on event-like background"
            />
          </div>
          <div class="caption">Event-like background</div>
        </section>
      </div>
    </main>
  </body>
</html>
