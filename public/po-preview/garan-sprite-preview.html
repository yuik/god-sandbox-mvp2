<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Garan PO Sprite Preview</title>
    <style>
      :root {
        --sheet: url("/art/characters/defaults/garan/sprites/resident-sprite-sheet-combined-preview-v21.png");
        --frame-width: 118px;
        --frame-height: 136px;
        --columns: 7;
        --rows: 14;
        --sheet-width: calc(var(--frame-width) * var(--columns));
        --sheet-height: calc(var(--frame-height) * var(--rows));
        --preview-scale: 1.5;
        color: #211d17;
        background:
          radial-gradient(circle at 18% 9%, rgba(187, 135, 66, 0.28), transparent 30rem),
          linear-gradient(135deg, #f3ead8 0%, #e9e1d3 56%, #d8c4a5 100%);
        font-family:
          "Yu Gothic UI",
          "Hiragino Sans",
          "Meiryo",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 52px);
        letter-spacing: -0.05em;
      }

      .lead {
        max-width: 860px;
        margin: 0;
        color: #5b5143;
        line-height: 1.8;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .toolbar a,
      .toolbar button {
        border: 1px solid rgba(63, 46, 30, 0.24);
        border-radius: 999px;
        padding: 10px 16px;
        color: #211d17;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 10px 28px rgba(67, 53, 35, 0.12);
        cursor: pointer;
        font: inherit;
        text-decoration: none;
      }

      .spec {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin: 24px 0;
      }

      .spec div {
        border: 1px solid rgba(63, 46, 30, 0.16);
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.56);
      }

      .spec strong {
        display: block;
        font-size: 13px;
        color: #6a5c4b;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      .sheet-review {
        display: grid;
        gap: 12px;
        margin: 24px 0;
        border: 1px solid rgba(63, 46, 30, 0.16);
        border-radius: 24px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.56);
      }

      .sheet-review h2,
      .sheet-review p {
        margin: 0;
      }

      .sheet-review img {
        display: block;
        width: min(100%, 826px);
        height: auto;
        border-radius: 14px;
        background: #111;
      }

      .motion-card {
        display: grid;
        grid-template-columns: minmax(220px, max-content) 1fr;
        gap: 14px;
        align-items: center;
        min-height: 232px;
        border: 1px solid rgba(63, 46, 30, 0.16);
        border-radius: 24px;
        padding: 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.48)),
          repeating-linear-gradient(
            45deg,
            rgba(85, 68, 42, 0.04) 0 8px,
            transparent 8px 16px
          );
        box-shadow: 0 18px 40px rgba(67, 53, 35, 0.12);
      }

      .sprite-box {
        width: calc(var(--frame-width) * var(--preview-scale));
        height: calc(var(--frame-height) * var(--preview-scale));
        display: grid;
        place-items: end center;
      }

      .sprite-frame {
        width: var(--frame-width);
        height: var(--frame-height);
        overflow: hidden;
        transform: scale(var(--preview-scale));
        transform-origin: center bottom;
      }

      .sprite {
        width: var(--frame-width);
        height: var(--frame-height);
        background-image: var(--sheet);
        background-repeat: no-repeat;
        background-size: var(--sheet-width) var(--sheet-height);
        background-position: 0 calc(var(--row) * var(--frame-height) * -1);
        animation: play-row 0.86s steps(var(--motion-frames)) infinite;
        image-rendering: auto;
        filter: drop-shadow(0 10px 10px rgba(32, 25, 16, 0.24));
      }

      .sprite--failed {
        animation-duration: 1.25s;
      }

      .paused .sprite {
        animation-play-state: paused;
      }

      .motion-card h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .motion-card p {
        margin: 0;
        color: #635746;
        line-height: 1.6;
        font-size: 13px;
      }

      @keyframes play-row {
        from {
          background-position: 0 calc(var(--row) * var(--frame-height) * -1);
        }

        to {
          background-position: calc(var(--frame-width) * var(--motion-frames) * -1)
            calc(var(--row) * var(--frame-height) * -1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Garan PO Sprite Preview</h1>
        <p class="lead">
          Garanの1枚統合sprite sheetを、行ごとに同時再生する確認ページです。
          この版はEveと同じ7列×14行で、Codex pet風の生成結果をセル境界内に収めています。
        </p>
        <div class="toolbar">
          <button type="button" id="pauseButton">一時停止</button>
          <a href="/sandbox?mode=manual-sweep">箱庭で見る</a>
          <a href="/art/characters/defaults/garan/sprites/resident-sprite-sheet-combined-preview-v21.png">
            元PNGを開く
          </a>
          <a href="/art/characters/defaults/garan/sprites/resident-sprite-sheet-combined-preview-v21-grid-review.png">
            グリッド付きPNGを開く
          </a>
        </div>
      </header>

      <section class="spec" aria-label="sprite sheet specification">
        <div><strong>frame</strong>118 x 136 px</div>
        <div><strong>columns</strong>7 frames</div>
        <div><strong>rows</strong>14 rows</div>
        <div><strong>canvas</strong>826 x 1904 px</div>
      </section>

      <section class="sheet-review" aria-label="grid review sheet">
        <h2>セル境界つき確認画像</h2>
        <p>PO確認用に、各コマの118 x 136セルが分かる赤いグリッドを重ねています。</p>
        <img
          src="/art/characters/defaults/garan/sprites/resident-sprite-sheet-combined-preview-v21-grid-review.png"
          alt="Garan sprite sheet with red cell grid lines"
        />
      </section>

      <section class="grid" id="motionGrid" aria-label="motion preview grid"></section>
    </main>

    <script>
      const motions = [
        ["idle", 0, "待機。足元と角がセル内に収まるかを見る。"],
        ["walk-right", 1, "右歩き。横移動時に隣セルを拾わないかを見る。"],
        ["walk-left", 2, "左歩き。横移動時に足が切れないかを見る。"],
        ["waving", 3, "手振り。手と角がセル外へ出ないかを見る。"],
        ["jumping", 4, "ジャンプ。上下の余白と空中感を見る。"],
        ["failed", 5, "失敗。7セルを再生し、隣セルや上下行を拾わないかを見る。"],
        ["waiting", 6, "待機差分。idleより待っている感じに見えるかを見る。"],
        ["review", 7, "確認。紙と手元がセル内に収まるかを見る。"],
        ["walk-up / walk-back", 8, "後ろ姿。walk-backもこの行を使う。"],
        ["walk-down / walk-forward", 9, "正面歩き。walk-forwardもこの行を使う。"],
        ["emote-happy", 10, "喜び。小さな効果は同じセル内なら可。"],
        ["emote-angry", 11, "怒り。赤い効果がセル外へ出ないかを見る。"],
        ["emote-sad", 12, "悲しみ。涙や記号がセル外へ出ないかを見る。"],
        ["emote-surprised", 13, "驚き。怒りに見えないかを見る。"],
      ];

      const grid = document.querySelector("#motionGrid");
      for (const [name, row, note, motionFrames = 7] of motions) {
        const card = document.createElement("article");
        card.className = "motion-card";
        const spriteClass = name === "failed" ? "sprite sprite--failed" : "sprite";
        card.innerHTML = `
          <div class="sprite-box">
            <div class="sprite-frame">
              <div class="${spriteClass}" style="--row: ${row}; --motion-frames: ${motionFrames};"></div>
            </div>
          </div>
          <div>
            <h2>row ${row}: ${name}</h2>
            <p>${note}</p>
          </div>
        `;
        grid.append(card);
      }

      const button = document.querySelector("#pauseButton");
      button.addEventListener("click", () => {
        document.body.classList.toggle("paused");
        button.textContent = document.body.classList.contains("paused")
          ? "再生"
          : "一時停止";
      });
    </script>
  </body>
</html>
