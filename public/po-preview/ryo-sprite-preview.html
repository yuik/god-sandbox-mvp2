<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ryo PO Sprite Preview</title>
    <style>
      :root {
        --sheet: url("/art/characters/defaults/ryo/sprites/resident-sprite-sheet-combined-preview-v12.png");
        --frame-width: 148px;
        --frame-height: 144px;
        --columns: 6;
        --rows: 14;
        --sheet-width: calc(var(--frame-width) * var(--columns));
        --sheet-height: calc(var(--frame-height) * var(--rows));
        --preview-scale: 1.5;
        color: #1e241e;
        background:
          radial-gradient(circle at 15% 8%, rgba(190, 173, 94, 0.28), transparent 30rem),
          linear-gradient(135deg, #f4efdd 0%, #e5efe9 54%, #d4e1d0 100%);
        font-family:
          "Yu Gothic UI",
          "Hiragino Sans",
          "Meiryo",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 48px;
      }

      header {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 52px);
        letter-spacing: -0.05em;
      }

      .lead {
        max-width: 860px;
        margin: 0;
        color: #4d584a;
        line-height: 1.8;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .toolbar a,
      .toolbar button {
        border: 1px solid rgba(51, 65, 42, 0.24);
        border-radius: 999px;
        padding: 10px 16px;
        color: #1e241e;
        background: rgba(255, 255, 255, 0.64);
        box-shadow: 0 10px 28px rgba(67, 79, 54, 0.12);
        cursor: pointer;
        font: inherit;
        text-decoration: none;
      }

      .spec {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin: 24px 0;
      }

      .spec div {
        border: 1px solid rgba(51, 65, 42, 0.16);
        border-radius: 18px;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.54);
      }

      .spec strong {
        display: block;
        font-size: 13px;
        color: #626c5d;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }

      .motion-card {
        display: grid;
        grid-template-columns: minmax(190px, max-content) 1fr;
        gap: 14px;
        align-items: center;
        min-height: 220px;
        border: 1px solid rgba(51, 65, 42, 0.16);
        border-radius: 24px;
        padding: 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.46)),
          repeating-linear-gradient(
            45deg,
            rgba(85, 97, 72, 0.04) 0 8px,
            transparent 8px 16px
          );
        box-shadow: 0 18px 40px rgba(67, 79, 54, 0.12);
      }

      .sprite-box {
        width: calc(var(--frame-width) * var(--frame-max-span) * var(--preview-scale));
        height: calc(var(--frame-height) * var(--preview-scale));
        display: grid;
        place-items: end center;
      }

      .sprite-frame {
        width: calc(var(--frame-width) * var(--frame-max-span));
        height: var(--frame-height);
        overflow: hidden;
        transform: scale(var(--preview-scale));
        transform-origin: center bottom;
      }

      .sprite {
        width: var(--frame-width);
        height: var(--frame-height);
        background-image: var(--sheet);
        background-repeat: no-repeat;
        background-size: var(--sheet-width) var(--sheet-height);
        background-position: 0 calc(var(--row) * var(--frame-height) * -1);
        animation: play-row 0.86s steps(var(--motion-frames)) infinite;
        image-rendering: auto;
        filter: drop-shadow(0 10px 10px rgba(32, 46, 28, 0.24));
      }

      .paused .sprite {
        animation-play-state: paused;
      }

      .motion-card h2 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      .motion-card p {
        margin: 0;
        color: #5b6556;
        line-height: 1.6;
        font-size: 13px;
      }

      @keyframes play-row {
        from {
          background-position: 0 calc(var(--row) * var(--frame-height) * -1);
        }

        to {
          background-position: calc(var(--frame-width) * var(--motion-frames) * -1)
            calc(var(--row) * var(--frame-height) * -1);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Ryo PO Sprite Preview</h1>
        <p class="lead">
          Ryoの1枚統合sprite sheetを、行ごとに同時再生する確認ページです。
          新しいcombined 14×6規格に合わせた1枚構成で、全行を6フレーム再生します。
        </p>
        <div class="toolbar">
          <button type="button" id="pauseButton">一時停止</button>
          <a href="/sandbox?mode=manual-sweep">箱庭で見る</a>
          <a href="/art/characters/defaults/ryo/sprites/resident-sprite-sheet-combined-preview-v12.png">
            元PNGを開く
          </a>
          <a href="/art/characters/defaults/ryo/sprites/resident-sprite-sheet-combined-preview-v12-grid.png">
            グリッドPNGを開く
          </a>
        </div>
      </header>

      <section class="spec" aria-label="sprite sheet specification">
        <div><strong>frame</strong>148 x 144 px</div>
        <div><strong>columns</strong>6 frames</div>
        <div><strong>rows</strong>14 rows</div>
        <div><strong>canvas</strong>888 x 2016 px</div>
      </section>

      <section class="grid" id="motionGrid" aria-label="motion preview grid"></section>
    </main>

    <script>
      const motions = [
        ["idle", 0, "待機。足元と頭がセル内に収まるかを見る。"],
        ["walk-right", 1, "右歩き。横移動時に隣セルを拾わないかを見る。"],
        ["walk-left", 2, "左歩き。横移動時に足が切れないかを見る。"],
        ["waving", 3, "手振り。手と髪がセル外へ出ないかを見る。"],
        ["jumping", 4, "ジャンプ。上下の余白が残るかを見る。"],
        ["failed", 5, "失敗。新しい14×6規格に合わせ、座りから倒れまで6セル内で再生する。"],
        ["waiting", 6, "待機差分。idleより少し待っている感じに見えるかを見る。"],
        ["review", 7, "確認。手元がセル内に収まるかを見る。"],
        ["walk-up / walk-back", 8, "後ろ姿。walk-backもこの行を使う。"],
        ["walk-down / walk-forward", 9, "正面歩き。walk-forwardもこの行を使う。"],
        ["emote-happy", 10, "喜び。小さな効果は同じセル内なら可。"],
        ["emote-angry", 11, "怒り。小さな効果は同じセル内なら可。"],
        ["emote-sad", 12, "悲しみ。涙や記号がセル外へ出ないかを見る。"],
        ["emote-surprised", 13, "驚き。怒りに見えないかを見る。"],
      ];

      const grid = document.querySelector("#motionGrid");
      for (const [name, row, note, motionFrames = 6, frameMaxSpan = 1] of motions) {
        const card = document.createElement("article");
        card.className = "motion-card";
        card.innerHTML = `
          <div class="sprite-box" style="--frame-max-span: ${frameMaxSpan};">
            <div class="sprite-frame" style="--frame-max-span: ${frameMaxSpan};">
              <div class="sprite" style="--row: ${row}; --motion-frames: ${motionFrames};"></div>
            </div>
          </div>
          <div>
            <h2>row ${row}: ${name}</h2>
            <p>${note}</p>
          </div>
        `;
        grid.append(card);
      }

      const button = document.querySelector("#pauseButton");
      button.addEventListener("click", () => {
        document.body.classList.toggle("paused");
        button.textContent = document.body.classList.contains("paused")
          ? "再生"
          : "一時停止";
      });
    </script>
  </body>
</html>
